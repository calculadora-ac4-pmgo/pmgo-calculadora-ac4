<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora AC4 – Hora Extra</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 20px;
        }
        .container {
            background: #ffffff;
            max-width: 520px;
            width: 100%;
            padding: 30px 28px;
            border-radius: 20px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            transition: 0.3s;
        }
        h1 {
            font-size: 24px;
            color: #1a2a3a;
            text-align: center;
            margin-top: 0;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #4a5a6a;
            font-size: 14px;
            margin-bottom: 22px;
            border-bottom: 2px solid #e9edf2;
            padding-bottom: 14px;
        }
        .subtitle strong {
            color: #c0392b;
        }
        label {
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
            display: block;
            margin: 14px 0 4px 0;
        }
        input[type="datetime-local"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid #dce3ec;
            border-radius: 12px;
            background: #fafcff;
            transition: 0.2s;
        }
        input[type="datetime-local"]:focus {
            border-color: #2980b9;
            outline: none;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.15);
        }
        .input-group {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 6px;
        }
        .input-group input[type="number"] {
            flex: 1;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid #dce3ec;
            border-radius: 12px;
            background: #fafcff;
            transition: 0.2s;
        }
        .input-group input[type="number"]:focus {
            border-color: #2980b9;
            outline: none;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(41, 128, 185, 0.15);
        }
        .input-group span {
            font-weight: 600;
            color: #2c3e50;
            font-size: 15px;
        }
        .btn-calcular {
            width: 100%;
            padding: 14px;
            margin-top: 22px;
            background: #1a5276;
            color: white;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .btn-calcular:hover {
            background: #154360;
        }
        .btn-calcular:active {
            transform: scale(0.97);
        }
        .result-box {
            margin-top: 24px;
            background: #eaf2f8;
            border-radius: 14px;
            padding: 18px 20px;
            border-left: 6px solid #1a5276;
        }
        .result-box .label {
            font-size: 13px;
            color: #2c3e50;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .result-box .valor {
            font-size: 32px;
            font-weight: 800;
            color: #0e2c40;
            margin: 4px 0 2px 0;
        }
        .result-box .detalhe {
            font-size: 14px;
            color: #2c3e50;
            margin-top: 6px;
            border-top: 1px solid #cbd7e6;
            padding-top: 10px;
        }
        .result-box .detalhe span {
            font-weight: 600;
        }
        .aviso {
            margin-top: 18px;
            font-size: 13px;
            color: #7f8c8d;
            text-align: center;
            border-top: 1px solid #e9edf2;
            padding-top: 16px;
        }
        .aviso a {
            color: #1a5276;
            text-decoration: none;
        }
        .aviso a:hover {
            text-decoration: underline;
        }
        .erro {
            color: #c0392b;
            font-weight: 600;
            margin-top: 8px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .container {
                padding: 20px 16px;
            }
            .result-box .valor {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⏱️ AC4</h1>
    <div class="subtitle">
        Serviço Extraordinário · <strong>PORTARIA SSP Nº 621/2026</strong>
    </div>

    <!-- Data/Hora do início do serviço -->
    <label for="inicio">📅 Data e hora de início do serviço</label>
    <input type="datetime-local" id="inicio" />

    <!-- Quantidade de horas -->
    <label for="horas">⏳ Quantidade de horas trabalhadas</label>
    <div class="input-group">
        <input type="number" id="horas" min="0.5" step="0.5" value="1" />
        <span>horas</span>
    </div>

    <button class="btn-calcular" id="calcularBtn">🔢 Calcular valor</button>

    <!-- Resultado -->
    <div id="resultado" class="result-box" style="display: none;">
        <div class="label">Valor a receber</div>
        <div class="valor" id="valorFinal">R$ 0,00</div>
        <div class="detalhe" id="detalheCalculo"></div>
    </div>

    <div id="erro" class="erro"></div>

    <div class="aviso">
        Baseado na Portaria SSP nº 621/2026 – Vigência a partir de 01/07/2026<br />
        <small>Dúvidas: consulte a legislação oficial.</small>
    </div>
</div>

<script>
    (function() {
        const inicioInput = document.getElementById('inicio');
        const horasInput = document.getElementById('horas');
        const calcularBtn = document.getElementById('calcularBtn');
        const resultadoDiv = document.getElementById('resultado');
        const valorFinalSpan = document.getElementById('valorFinal');
        const detalheSpan = document.getElementById('detalheCalculo');
        const erroDiv = document.getElementById('erro');

        // --- Tabela de valores (conforme PORTARIA SSP Nº 621/2026) ---
        const TARIFAS = {
            // dias de semana: 0 = domingo, 1 = seg, 2 = ter, 3 = qua, 4 = qui, 5 = sex, 6 = sáb
            // diurno: 05:01 às 21:59
            // noturno: 22:00 às 05:00
            getTarifa: function(dataHora) {
                const dia = dataHora.getDay(); // 0=domingo ... 6=sábado
                const horas = dataHora.getHours();
                const minutos = dataHora.getMinutes();
                const totalMinutos = horas * 60 + minutos;

                // Define se é noturno (22:00 até 05:00)
                // Noturno: das 22h (inclusive) até 5h (inclusive) do dia seguinte
                const isNoturno = (totalMinutos >= 22 * 60) || (totalMinutos <= 5 * 60);

                // Define se é fim de semana (sexta, sábado, domingo) -> dias 5, 6, 0
                const isFimDeSemana = (dia === 5 || dia === 6 || dia === 0);

                if (isFimDeSemana) {
                    // ESCALA VERMELHA (sexta a domingo)
                    if (isNoturno) {
                        return { valor: 45.00, periodo: 'Noturno (sex a dom)', escala: 'Vermelha' };
                    } else {
                        return { valor: 40.00, periodo: 'Diurno (sex a dom)', escala: 'Vermelha' };
                    }
                } else {
                    // ESCALA AZUL (segunda a quinta)
                    if (isNoturno) {
                        return { valor: 33.00, periodo: 'Noturno (seg a qui)', escala: 'Azul' };
                    } else {
                        return { valor: 30.00, periodo: 'Diurno (seg a qui)', escala: 'Azul' };
                    }
                }
            }
        };

        // --- Função para obter data/hora atual no fuso local (para preencher o input) ---
        function getLocalDateTimeString() {
            const now = new Date();
            const offset = now.getTimezoneOffset();
            const local = new Date(now.getTime() - offset * 60000);
            return local.toISOString().slice(0, 16);
        }

        // --- Configura valor inicial ---
        inicioInput.value = getLocalDateTimeString();

        // --- Evento de cálculo ---
        function calcular() {
            // Limpa erros
            erroDiv.textContent = '';
            resultadoDiv.style.display = 'none';

            // Valida entrada
            const inicioVal = inicioInput.value;
            if (!inicioVal) {
                erroDiv.textContent = '❌ Por favor, selecione a data e hora de início.';
                return;
            }

            const horasTrabalhadas = parseFloat(horasInput.value);
            if (isNaN(horasTrabalhadas) || horasTrabalhadas <= 0) {
                erroDiv.textContent = '❌ Informe um número válido de horas (ex: 1, 2.5, 0.5).';
                return;
            }

            // Cria objeto Date a partir do input (considera timezone local)
            const dataInicio = new Date(inicioVal);
            if (isNaN(dataInicio.getTime())) {
                erroDiv.textContent = '❌ Data inválida.';
                return;
            }

            // Obtém a tarifa para o horário de início
            const tarifaInfo = TARIFAS.getTarifa(dataInicio);
            const valorHora = tarifaInfo.valor;

            // Calcula o total
            const total = valorHora * horasTrabalhadas;

            // Exibe resultado
            valorFinalSpan.textContent = total.toLocaleString('pt-BR', {
                style: 'currency',
                currency: 'BRL',
                minimumFractionDigits: 2
            });

            // Formata data/hora para exibição amigável
            const options = {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            };
            const dataStr = dataInicio.toLocaleDateString('pt-BR', options);

            // Monta detalhe
            const diaSemana = ['domingo', 'segunda', 'terça', 'quarta', 'quinta', 'sexta', 'sábado'][dataInicio.getDay()];
            detalheSpan.innerHTML = `
                <span>${dataStr}</span> · ${diaSemana}<br />
                <span>${tarifaInfo.escala}</span> · ${tarifaInfo.periodo}<br />
                ${horasTrabalhadas}h × R$ ${valorHora.toFixed(2).replace('.', ',')} = <strong>${total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</strong>
            `;

            resultadoDiv.style.display = 'block';
        }

        // --- Atribui eventos ---
        calcularBtn.addEventListener('click', calcular);

        // Permite calcular com Enter nos campos
        inicioInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') calcular(); });
        horasInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') calcular(); });

        // --- Inicializa com cálculo automático ao carregar ---
        window.addEventListener('DOMContentLoaded', () => {
            // Pequeno delay para garantir que o input foi preenchido
            setTimeout(calcular, 100);
        });

    })();
</script>

</body>
</html>

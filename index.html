<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora AC4 - 19º CRPM</title>
  <style>
    :root {
      --verde: #007a3d;
      --verde-escuro: #064b2f;
      --azul: #1f5f85;
      --dourado: #d6b25e;
      --texto: #102a43;
      --muted: #667085;
      --borda: #d8e2ec;
      --bg: #eef3f7;
      --card: #ffffff;
      --erro: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: radial-gradient(circle at top, #ffffff 0, var(--bg) 54%, #e4ebf1 100%);
      color: var(--texto);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .app {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(16, 42, 67, 0.16);
      padding: 26px;
      border: 1px solid rgba(216, 226, 236, 0.9);
    }

    .topo {
      text-align: center;
      border-bottom: 1px solid var(--borda);
      padding-bottom: 18px;
      margin-bottom: 18px;
    }

    .brasao {
      width: 86px;
      height: 86px;
      object-fit: contain;
      margin: 0 auto 8px;
      display: block;
    }

    .brasao-fallback {
      width: 78px;
      height: 78px;
      border-radius: 18px;
      margin: 0 auto 10px;
      display: none;
      place-items: center;
      background: linear-gradient(135deg, #fff8df, var(--dourado));
      color: var(--verde-escuro);
      font-weight: 900;
      font-size: 15px;
      line-height: 1.05;
      box-shadow: 0 8px 16px rgba(0,0,0,.12);
    }

    h1 {
      margin: 0;
      font-size: 25px;
      color: #09233a;
    }

    .subtitulo {
      margin-top: 6px;
      font-size: 14px;
      color: var(--muted);
    }

    .subtitulo strong { color: #c0392b; }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 14px;
      font-weight: 700;
      color: #243b53;
    }

    input {
      width: 100%;
      border: 2px solid var(--borda);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 16px;
      background: #fbfdff;
      transition: .2s;
    }

    input:focus {
      border-color: var(--azul);
      outline: none;
      box-shadow: 0 0 0 4px rgba(31, 95, 133, .12);
      background: #fff;
    }

    .linha-horas {
      display: grid;
      grid-template-columns: 1fr 70px;
      gap: 10px;
      align-items: center;
    }

    .linha-horas span {
      font-weight: 700;
      color: #243b53;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 15px;
      padding: 15px 16px;
      margin-top: 18px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-calcular {
      background: var(--azul);
      color: #fff;
    }

    .btn-pdf {
      background: var(--verde);
      color: #fff;
      margin-top: 10px;
      display: none;
    }

    .resultado {
      display: none;
      margin-top: 22px;
      background: #eaf4fb;
      border-left: 7px solid var(--azul);
      border-radius: 17px;
      padding: 18px 20px;
    }

    .resultado small {
      display: block;
      text-transform: uppercase;
      letter-spacing: .4px;
      font-weight: 800;
      color: #2c3e50;
      margin-bottom: 6px;
    }

    .valor {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      color: #0b2f4a;
      margin-bottom: 12px;
    }

    .detalhe {
      border-top: 1px solid #c9d8e5;
      padding-top: 11px;
      font-size: 14px;
      color: #243b53;
      line-height: 1.45;
    }

    .erro {
      color: var(--erro);
      font-weight: 700;
      text-align: center;
      margin-top: 10px;
    }

    details {
      margin-top: 16px;
      border-top: 1px solid var(--borda);
      padding-top: 12px;
    }

    summary {
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .valores-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .valores-grid label { font-size: 12px; margin-top: 8px; }
    .valores-grid input { font-size: 14px; padding: 10px; }

    .aviso {
      margin-top: 18px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    @media (max-width: 480px) {
      .app { padding: 21px 16px; }
      h1 { font-size: 22px; }
      .valor { font-size: 30px; }
    }

    @media print {
      body { background: #fff; display: block; padding: 0; }
      .app { box-shadow: none; max-width: none; border: 0; }
      .btn-calcular, .btn-pdf, details, .erro { display: none !important; }
      .resultado { display: block !important; border: 1px solid #999; border-left: 7px solid #333; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topo">
      <img class="brasao" src="assets/brasao-19crpm.png" alt="Brasão do 19º CRPM" onerror="this.style.display='none';document.getElementById('fallback').style.display='grid'" />
      <div id="fallback" class="brasao-fallback">19º<br>CRPM<br>PMGO</div>
      <h1>⏱️ AC4</h1>
      <div class="subtitulo">Serviço Extraordinário · <strong>PORTARIA SSP Nº 621/2026</strong></div>
    </header>

    <label for="inicio">📅 Data e hora de início do serviço</label>
    <input type="datetime-local" id="inicio" />

    <label for="horas">⏳ Quantidade de horas trabalhadas</label>
    <div class="linha-horas">
      <input type="number" id="horas" min="0.5" step="0.5" value="1" />
      <span>horas</span>
    </div>

    <button class="btn-calcular" onclick="calcular()">🔢 Calcular valor</button>

    <section class="resultado" id="resultado">
      <small>Valor estimado a receber</small>
      <div class="valor" id="valorFinal">R$ 0,00</div>
      <div class="detalhe" id="detalhe"></div>
    </section>

    <button class="btn-pdf" id="btnPdf" onclick="window.print()">📄 Salvar em PDF</button>

    <div id="erro" class="erro"></div>

    <details>
      <summary>Ajustar valores da tabela, se necessário</summary>
      <div class="valores-grid">
        <div><label>Azul diurno</label><input id="azulDia" type="number" value="30" step="0.01" /></div>
        <div><label>Azul noturno</label><input id="azulNoite" type="number" value="33" step="0.01" /></div>
        <div><label>Vermelha diurna</label><input id="vermelhaDia" type="number" value="40" step="0.01" /></div>
        <div><label>Vermelha noturna</label><input id="vermelhaNoite" type="number" value="45" step="0.01" /></div>
      </div>
    </details>

    <div class="aviso">
      Cálculo de apoio. O pagamento final depende da escala validada, da tabela oficial vigente e da conferência administrativa.
    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function moeda(centavos) {
      return (centavos / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    function centavos(id) {
      return Math.round((parseFloat($(id).value || '0')) * 100);
    }

    function preencherAgora() {
      const agora = new Date();
      const local = new Date(agora.getTime() - agora.getTimezoneOffset() * 60000);
      $('inicio').value = local.toISOString().slice(0, 16);
    }

    function tarifa(data) {
      const dia = data.getDay();
      const minutos = data.getHours() * 60 + data.getMinutes();
      const noturno = minutos >= 22 * 60 || minutos <= 5 * 60;
      const vermelha = dia === 5 || dia === 6 || dia === 0;

      if (vermelha && noturno) return { nome: 'Vermelha · Noturno', valor: centavos('vermelhaNoite') };
      if (vermelha) return { nome: 'Vermelha · Diurno', valor: centavos('vermelhaDia') };
      if (noturno) return { nome: 'Azul · Noturno', valor: centavos('azulNoite') };
      return { nome: 'Azul · Diurno', valor: centavos('azulDia') };
    }

    function calcularPorMinuto(inicio, horas) {
      const minutosTotais = Math.round(horas * 60);
      let total = 0;
      const partes = {};

      for (let i = 0; i < minutosTotais; i++) {
        const momento = new Date(inicio.getTime() + i * 60000);
        const t = tarifa(momento);
        total += t.valor / 60;
        partes[t.nome] = (partes[t.nome] || 0) + 1;
      }

      return { total: Math.round(total), partes };
    }

    function calcular() {
      $('erro').textContent = '';
      const inicioValor = $('inicio').value;
      const horas = parseFloat($('horas').value);

      if (!inicioValor) {
        $('erro').textContent = 'Informe a data e hora de início.';
        return;
      }

      if (!horas || horas <= 0) {
        $('erro').textContent = 'Informe uma quantidade válida de horas.';
        return;
      }

      const inicio = new Date(inicioValor);
      const fim = new Date(inicio.getTime() + horas * 3600000);
      const calculo = calcularPorMinuto(inicio, horas);
      const diaSemana = ['domingo','segunda','terça','quarta','quinta','sexta','sábado'][inicio.getDay()];
      const linhas = Object.entries(calculo.partes)
        .map(([nome, minutos]) => `${nome}: ${(minutos / 60).toFixed(2).replace('.', ',')}h`)
        .join('<br>');

      $('valorFinal').textContent = moeda(calculo.total);
      $('detalhe').innerHTML = `
        <strong>Início:</strong> ${inicio.toLocaleString('pt-BR')} · ${diaSemana}<br>
        <strong>Término estimado:</strong> ${fim.toLocaleString('pt-BR')}<br>
        <strong>Total:</strong> ${horas.toString().replace('.', ',')}h<br>
        ${linhas}<br>
        <strong>Memória:</strong> cálculo proporcional por minuto trabalhado.
      `;
      $('resultado').style.display = 'block';
      $('btnPdf').style.display = 'block';
    }

    $('inicio').addEventListener('keydown', (e) => { if (e.key === 'Enter') calcular(); });
    $('horas').addEventListener('keydown', (e) => { if (e.key === 'Enter') calcular(); });
    preencherAgora();
  </script>
</body>
</html>
